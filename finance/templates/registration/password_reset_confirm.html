<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style=" min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="card shadow-lg p-4" style="width: 400px; border-radius:15px;">

    {% if validlink %}
        <h3 class="text-center mb-3">🔐 Create New Password</h3>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">New Password</label>
                {{ form.new_password1 }}
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                {{ form.new_password2 }}
            </div>

            <div class="d-grid mt-3">
                <button class="btn bg-primary text-white">Change Password</button>
            </div>
        </form>

    {% else %}
        <h5 class="text-danger text-center">Link Expired ❌</h5>
        <div class="d-grid mt-3">
            <a href="{% url 'password_reset' %}" class="btn btn-primary">Request New Link</a>
        </div>
    {% endif %}

</div>

</body>
</html>
