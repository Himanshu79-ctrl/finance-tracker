<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!--for chart generation-->
    <title>{% block title %}{% endblock title %}</title>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-indigo-500 p-4 text-white flex justify-between items-center">
        
        <!-- Left Side Links (Always show Home) -->
        <div class="flex space-x-4">
            <a href="{% url 'home' %}" class="hover:underline">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="hover:underline">Dashboard</a>
                <a href="{% url 'transaction_add' %}" class="hover:underline">Add Transaction</a>
                <a href="{% url 'transaction_list' %}" class="hover:underline">Transactions</a>
                <a href="{% url 'goal_add' %}" class="hover:underline">Add Goal</a>
            {% endif %}
        </div>

        <!-- Right Side Links / User -->
        {% if user.is_authenticated %}
            <!-- User Avatar Dropdown -->
            <div class="relative flex items-center space-x-3">
                <span class="hidden sm:inline font-semibold">{{ user.username|capfirst }}</span>

                <div x-data="{ open: false }" class="relative">
                    <button @click="open = !open" class="focus:outline-none">
                        <img 
                            src="{% if user.profile.avatar %}{{ user.profile.avatar.url }}{% else %}/static/avatars/default_avatar.png{% endif %}" 
                            alt="Avatar" 
                            class="w-10 h-10 rounded-full object-cover border-2 border-white hover:ring-2 hover:ring-white transition"
                        >
                    </button>

                    <!-- Dropdown Menu -->
                    <div 
                        x-show="open" 
                        @click.away="open = false" 
                        x-transition
                        class="absolute right-0 mt-2 w-40 bg-white text-gray-800 rounded shadow-lg z-50"
                    >
                        <a href="{% url 'profile' %}" class="block px-4 py-2 hover:bg-indigo-100">Profile</a>
                        <form id="logout-form" action="{% url 'logout' %}" method="POST">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-600 font-semibold">Logout</button>
                        </form>
                    </div>
                </div>
            </div>

        {% else %}
            <!-- Login / Register links for unauthenticated users -->
            <div class="flex space-x-4">
                <a href="{% url 'login' %}" class="hover:underline">Login</a>
                <a href="{% url 'register' %}" class="hover:underline">Register</a>
            </div>
        {% endif %}

    </nav>

    <!-- Page content -->
    {% block content %}{% endblock content %}

    <!-- Alpine.js for dropdown -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
        
</body>
</html>
